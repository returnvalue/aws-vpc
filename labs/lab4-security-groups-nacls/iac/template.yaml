AWSTemplateFormatVersion: '2010-09-09'
Parameters:
  VpcId: {Type: String}
  PublicSubnetId: {Type: String}
Resources:
  WebServerSG:
    Type: 'AWS::EC2::SecurityGroup'
    Properties:
      GroupDescription: Allow HTTP
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
  PublicNacl:
    Type: 'AWS::EC2::NetworkAcl'
    Properties: {VpcId: !Ref VpcId}
  DenyMaliciousRule:
    Type: 'AWS::EC2::NetworkAclEntry'
    Properties:
      NetworkAclId: !Ref PublicNacl
      RuleNumber: 100
      Protocol: -1
      RuleAction: deny
      CidrBlock: 203.0.113.50/32
  AllowAllRule:
    Type: 'AWS::EC2::NetworkAclEntry'
    Properties:
      NetworkAclId: !Ref PublicNacl
      RuleNumber: 200
      Protocol: -1
      RuleAction: allow
      CidrBlock: 0.0.0.0/0
  NaclAssociation:
    Type: 'AWS::EC2::SubnetNetworkAclAssociation'
    Properties: {SubnetId: !Ref PublicSubnetId, NetworkAclId: !Ref PublicNacl}
